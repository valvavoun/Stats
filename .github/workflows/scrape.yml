name: MXGP Auto-Scrape

on:
  schedule:
    - cron: "0 22 * * 0"   # Dimanche 22h UTC
    - cron: "0 22 * * 1"   # Lundi   22h UTC
  workflow_dispatch:
    inputs:
      year:
        description: "Année (ex: 2026, ou 'all')"
        required: false
        default: "2026"
      cat:
        description: "Catégorie (ex: MXGP, MX2, vide = toutes)"
        required: false
        default: "MXGP"
      debug:
        description: "Mode debug verbose (true/false)"
        required: false
        default: "false"
  push:
    branches: [main]
    paths:
      - "scraper/scraper.js"
      - ".github/workflows/scrape.yml"

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape MXGP Results
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        working-directory: scraper
        env:
          YEAR: ${{ github.event.inputs.year  || '2026' }}
          CAT:  ${{ github.event.inputs.cat   || 'MXGP' }}
          DBG:  ${{ github.event.inputs.debug || 'false' }}
        run: |
          mkdir -p ../data
          EXTRA=""
          if [ "$DBG" = "true" ]; then EXTRA="--debug"; fi
          node scraper.js \
            --year "$YEAR" \
            --cat  "$CAT"  \
            --out  ../data/results.json \
            --slow 1500 \
            $EXTRA

      - name: Check output
        run: |
          if [ ! -f data/results.json ]; then
            echo "::error::data/results.json introuvable"
            exit 1
          fi
          SESSIONS=$(node -e "const d=require('./data/results.json'); console.log(d.total||0)")
          echo "Sessions scraped: $SESSIONS"
          if [ "$SESSIONS" = "0" ]; then
            echo "::warning::0 sessions — pas encore de données ou structure du site modifiée"
            echo "::warning::Relancer manuellement avec debug=true pour voir l'HTML du site"
          fi

      # Commit → GitHub Pages se met à jour automatiquement depuis la branche main
      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          if git diff --cached --quiet; then
            echo "Pas de changement — commit ignoré"
          else
            SESSIONS=$(node -e "const d=require('./data/results.json'); console.log(d.total||0)")
            git commit -m "🏁 Auto-scrape: ${SESSIONS} sessions [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
